<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Page introuvable · K9</title>
  <link rel="icon" type="image/x-icon" href="/branding/favicon.ico" />
  <meta name="theme-color" content="#e76f51" />
  <meta name="robots" content="noindex" />
  <style>
    *{box-sizing:border-box}html,body{margin:0;padding:0;height:100%}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#fff8f0;color:#2e2a26;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
    .wrap{max-width:480px;text-align:center}
    .wrap img{width:120px;height:120px;opacity:0.7;margin-bottom:18px}
    .code{font-size:64px;font-weight:800;color:#e76f51;line-height:1;margin:0;letter-spacing:-2px}
    h1{font-size:24px;font-weight:800;margin:14px 0 10px;color:#2e2a26;letter-spacing:-0.3px}
    p{font-size:15.5px;color:#5a5550;line-height:1.55;margin:0 0 24px}
    .btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
    .btn{
      background:linear-gradient(135deg,#f4a261,#e76f51);color:#fff;text-decoration:none;
      padding:12px 24px;border-radius:999px;font-weight:700;font-size:14.5px;
      box-shadow:0 6px 18px rgba(231,111,81,0.32);
    }
    .btn.ghost{background:#fff;color:#2e2a26;border:1px solid #f0e6db;box-shadow:none}
    .joke{margin-top:24px;font-size:13px;color:#9a948e;font-style:italic}
  </style>
</head>
<body>
  <div class="wrap">
    <img src="/branding/logo-paw-only.svg" alt="K9" />
    <p class="code">404</p>
    <h1>Cette page s'est échappée</h1>
    <p>On dirait que <strong>quelqu'un a creusé un trou</strong> sous la clôture.<br>La page que tu cherches n'existe pas (ou plus).</p>
    <div class="btns">
      <a href="/" class="btn">🏠 Retour à l'accueil</a>
      <a href="/landing" class="btn ghost">À propos de K9</a>
    </div>
    <div class="joke">Pas de panique, ton chien est probablement dans le jardin.</div>
  </div>
</body>
</html>
